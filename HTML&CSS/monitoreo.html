<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aplicación de monitoreo de actividad de seguridad">
    <title>Monitoreo de Actividad</title>
    <link rel="stylesheet" href="monitoreo.css">
    <link rel="shortcut icon" href="../assets/images/h.png" type="image/x-icon">
</head>

<body>
    <header>
        <img src="https://assets.soyhenry.com/logos/LOGO-HENRY-04.png" alt="Henry-Logo" width="150" height="60">
        <nav>
            <ul class="nav-list">
                <li><a href="index.html" target="_blank">Home</a></li>
                <li><a href="contrasena.html" target="_blank">Generar Contraseña</a></li>
                <li><a href="cajaFuerte.html" target="_blank">Caja Fuerte</a></li>
                <li><a href="#">Monitoreo de actividad</a></li>
                <li><a href="gestion.html" target="_blank">Gestión de usuarios</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="title">
            <h1>Asistente De Seguridad</h1>
            <p>Sistema de Monitoreo de Actividad Sospechosa</p>
        </section>
        <section class="monitoring">
            <form id="agregar">
                <div>
                    <label for="description">Descripción</label>
                    <input type="text" id="description" name="description" required>
                </div>
                <div>
                    <label for="nivel">Nivel de riesgo</label>
                    <input type="text" id="nivel" name="nivel" required>
                </div>
                <button type="submit">Agregar Actividad</button>
            </form>
            <form id="eliminar">
                <label for="eliminar">Eliminar actividad sospechosa</label>
                <input type="text" id="eliminar" name="eliminar" required>
                <button type="submit">Eliminar Actividad</button>
            </form>
            <form id="mostrar">
                <label for="filtrar">Filtrar actividades por nivel de riesgo</label>
                <input type="text" id="filtrar" name="filtrar" required>
                <button type="submit">Mostrar Actividades</button>
            </form>
            <form id="generar">
                <label for="generar">Reporte de actividades</label>
                <input type="text" id="generar" name="generar" required>
                <button type="submit">Generar Reporte</button>
            </form>
        </section>
    </main>
</body>

</html>
