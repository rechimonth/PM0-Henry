<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Aplicación de gestión de contraseñas y seguridad">
  <title>Generar Contraseña</title>
  <link rel="stylesheet" href="contrasena.css">
  <link rel="shortcut icon" href="../assets/images/h.png" type="image/x-icon">
</head>

<body>
  <header>
    <img src="https://assets.soyhenry.com/logos/LOGO-HENRY-04.png" alt="Henry-Logo" width="150" height="60">
    <nav>
      <ul class="nav-list">
        <li><a href="index.html" target="_blank">Home</a></li>
        <li><a href="#">Generar Contraseña</a></li>
        <li><a href="cajaFuerte.html" target="_blank">Caja Fuerte</a></li>
        <li><a href="monitoreo.html" target="_blank">Monitoreo de actividad</a></li>
        <li><a href="gestion.html" target="_blank">Gestión de usuarios</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="title">
      <h1>Asistente De Seguridad</h1>
      <p>Generador de contraseñas para usuarios:</p>
    </section>
    <section class="generator">
      <form id="formGenerator">
        <div>
          <label for="caracteres">Cantidad de caracteres deseados:</label>
          <input type="text" name="caracteres" id="caracteres" required>
        </div>
        <div>
          <label class="checkmark">
            <span>¿Incluir caracteres especiales?</span>
            <input type="checkbox" name="especiales" id="especiales">
            <span class="box"></span>
          </label>
        </div>
        <div>
          <label class="checkmark">
            <span>¿Incluir caracteres números?</span>
            <input type="checkbox" name="numeros" id="numeros">
            <span class="box"></span>
          </label>
        </div>
        <div>
          <label class="checkmark">
            <span>¿Incluir caracteres mayúsculas?</span>
            <input type="checkbox" name="mayusculas" id="mayusculas">
            <span class="box"></span>
          </label>
        </div>
        <div id="resultadoContrasena" class="contrasena"></div>
        <button type="submit">Generar Contraseña</button>
      </form>
    </section>
  </main>
  <script type="module" src="../JavaScript/scriptsContrasena.js"></script>
</body>

</html>
